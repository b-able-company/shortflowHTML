<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>정산 대시보드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard-common.css">
  <script src="dashboard-nav.js"></script>
  <style>
    :root {
      --primary-blue: #2E5BFF;
      --primary-blue-ink: #1D3FA8;
      --primary-blue-soft: #E8EFFE;
      --text-primary: #0F1115;
      --text-secondary: #5C6068;
      --text-faint: #9CA0A6;
      --border-color: #E7E5DF;
      --border-strong: #D4D2CB;
      --bg-light: rgb(250, 250, 250);
      --bg-white: #FFFFFF;
      --spacing-xs: 8px;
      --spacing-sm: 12px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --spacing-xl: 32px;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 14px;
      --max: 960px;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg-white);
    }

    body {
      font-family: 'Geist', 'Pretendard', system-ui, sans-serif;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    * { box-sizing: border-box; }

    .page-wrap {
      width: min(var(--max), calc(100vw - 48px));
      max-width: none;
      margin: 0 auto;
      padding: 32px 0 80px;
    }

    .notice-banner {
      background: rgb(30, 30, 30);
      color: #fff;
      border: 0.5px solid rgb(30, 30, 30);
      border-radius: var(--radius-lg);
      padding: 20px 22px;
      margin-bottom: 28px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px;
      gap: 22px;
      align-items: center;
    }

    .notice-left {
      padding-right: 22px;
      border-right: 0.5px solid rgba(255, 255, 255, 0.14);
    }

    .notice-right-block {
      min-width: 0;
      padding-top: 10px;
    }

    .notice-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transform: translateY(-4px);
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.88);
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 11px;
      font-weight: 600;
    }

    .notice-pill::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #F05A28;
    }

    .notice-title {
      margin: 12px 0 6px;
      color: #fff;
      font-size: 22px;
      line-height: 1.18;
      font-weight: 700;
      letter-spacing: -0.4px;
    }

    .notice-desc {
      margin: 0;
      color: rgba(255, 255, 255, 0.66);
      font-size: 13px;
      line-height: 1.5;
    }

    .notice-btn {
      margin-top: 16px;
      border: 0.5px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: none;
    }

    .notice-right-block .notice-btn {
      width: 100%;
      margin-top: 14px;
    }

    .notice-btn:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    .notice-right-label {
      margin: 0;
      color: rgba(255, 255, 255, 0.58);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .notice-right-amount {
      margin: 8px 0 10px;
      color: #fff;
      font-family: 'Geist', ui-monospace, Menlo, monospace;
      font-size: 30px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -1px;
      font-variant-numeric: tabular-nums;
    }

    .notice-right-meta {
      margin: 0;
      color: rgba(255, 255, 255, 0.58);
      font-size: 12px;
      font-weight: 500;
    }

    .status-summary {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .status-summary-card {
      border-radius: 10px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.54);
      border: 0.5px solid rgba(29, 63, 168, 0.12);
    }

    .status-summary-label {
      margin: 0;
      color: rgba(29, 63, 168, 0.72);
      font-size: 11px;
      font-weight: 600;
    }

    .status-summary-value {
      margin: 6px 0 0;
      color: var(--primary-blue-ink);
      font-family: 'Geist', ui-monospace, Menlo, monospace;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.4px;
      font-variant-numeric: tabular-nums;
    }

    .content-section {
      margin-top: 0;
      padding-top: 0;
    }

    .content-head {
      margin-top: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      flex-wrap: wrap;
      border-bottom: 0.5px solid var(--border-color);
      padding-bottom: 14px;
    }

    .content-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .section-copy {
      margin: 6px 0 0;
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.45;
    }

    .content-grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .content-card {
      border: 0.5px solid var(--border-color);
      border-radius: 14px;
      background: #fff;
      padding: 16px;
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr) 24px;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: background .15s ease, border-color .15s ease, box-shadow .15s ease;
    }

    .content-card:hover {
      background: rgb(250, 250, 250);
      border-color: var(--border-strong);
      box-shadow: 0 6px 18px rgba(15, 17, 21, 0.04);
    }

    .poster {
      width: 56px;
      height: 76px;
      border-radius: 8px;
      border: 0.5px solid rgba(0, 0, 0, 0.06);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .poster::after {
      content: '포스터';
      position: absolute;
      left: 6px;
      bottom: 6px;
      font-size: 8px;
      color: rgba(0, 0, 0, 0.35);
      font-weight: 600;
      font-family: 'Geist', ui-monospace, Menlo, monospace;
      letter-spacing: 0.3px;
    }

    .card-title {
      margin: 0;
      font-size: 15px;
      line-height: 1.2;
      letter-spacing: -0.2px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .card-title-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
    }

    .card-meta {
      margin: 0;
      color: var(--text-faint);
      font-size: 15px;
      font-weight: 500;
      line-height: 1.2;
      white-space: nowrap;
    }

    .card-sub {
      margin: 14px 0 0;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.2px;
    }

    .card-amount {
      margin: 0;
      font-family: 'Geist', ui-monospace, Menlo, monospace;
      font-size: 16px;
      line-height: 1.1;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.5px;
      font-variant-numeric: tabular-nums;
    }

    .card-foot {
      margin: 0;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
    }

    .card-arrow {
      color: var(--text-faint);
      font-size: 18px;
      text-align: right;
    }

    .history-section {
      margin-top: 56px;
      padding-top: 0;
    }

    .history-head {
      margin-top: 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 14px;
      padding-bottom: 12px;
      border-bottom: 0.5px solid var(--border-color);
    }

    .history-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .history-table-wrap {
      margin-top: 16px;
      border: 0.5px solid var(--border-color);
      border-radius: 14px;
      overflow: hidden;
      background: var(--bg-white);
    }

    .history-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .history-table thead th {
      background: var(--bg-light);
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 600;
      padding: 9px 22px;
      text-align: right;
      border-bottom: 0.5px solid var(--border-color);
      white-space: nowrap;
      letter-spacing: 0.4px;
    }

    .history-row td {
      padding: 8px 22px;
      border-bottom: 0.5px solid var(--border-color);
      background: #fff;
      vertical-align: middle;
      text-align: right;
    }

    .history-table thead th:nth-child(4),
    .history-row td:nth-child(4) {
      text-align: center;
    }

    .history-row:last-child td {
      border-bottom: 0;
    }

    .history-month {
      font-size: 13px;
      line-height: 1.2;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0;
      letter-spacing: -0.1px;
      white-space: nowrap;
    }

    .history-done-date {
      margin: 0;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
    }

    .history-count {
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
    }

    .history-amount-value {
      margin: 0;
      font-family: 'Geist', ui-monospace, Menlo, monospace;
      font-size: 14px;
      line-height: 1.2;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.2px;
      font-variant-numeric: tabular-nums;
    }

    .status-done {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #e6f2e8;
      color: #1f7d3f;
      font-size: 11px;
      font-weight: 600;
    }

    .status-done::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #1f7d3f;
    }

    .history-detail-btn {
      border: 0.5px solid var(--border-strong);
      background: #fff;
      border-radius: 8px;
      padding: 5px 10px;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .history-detail-btn:hover {
      background: rgb(250, 250, 250);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .summary-card {
      border: 0.5px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 14px;
      background: var(--bg-white);
    }

    .summary-label {
      color: var(--text-secondary);
      font-size: 12px;
    }

    .summary-value {
      margin-top: 6px;
      font-size: 20px;
      font-weight: 700;
    }

    .panel {
      border: 0.5px solid var(--border-color);
      border-radius: var(--radius-md);
      background: #fff;
      overflow: hidden;
    }

    .panel-head {
      padding: 14px 16px;
      border-bottom: 0.5px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .panel-title {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }

    .search {
      width: 260px;
      max-width: 100%;
      border: 0.5px solid var(--border-color);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px 16px;
      border-bottom: 0.5px solid var(--border-color);
      text-align: left;
      font-size: 14px;
      white-space: nowrap;
    }

    th {
      background: var(--bg-light);
      color: var(--text-secondary);
      font-weight: 600;
    }

    tr:hover td { background: rgb(250, 250, 250); }

    .status {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
    }

    .status.scheduled { background: #F1F1F1; color: #6B6F76; }
    .status.confirmed { background: #EAF8EC; color: #1C7A32; }
    .status.completed { background: #EAF0FF; color: #2F4AD8; }

    .btn-link {
      border: 0;
      background: transparent;
      color: var(--primary-blue-ink);
      cursor: pointer;
      font-weight: 600;
      padding: 0;
    }

    .empty {
      padding: 28px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(16, 20, 32, 0.5);
      z-index: 1200;
      padding: 24px;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal-panel {
      width: min(1180px, 100%);
      max-height: calc(100vh - 48px);
      overflow: auto;
      border-radius: 14px;
      background: #fff;
      border: 0.5px solid var(--border-color);
      box-shadow: 0 20px 50px rgba(16, 20, 32, 0.18);
    }

    .modal-head {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 18px 22px 16px;
      border-bottom: 0.5px solid var(--border-color);
      background: #fff;
    }

    .modal-title-block {
      min-width: 0;
    }

    .modal-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .modal-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .modal-subtitle {
      margin: 6px 0 0;
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.4;
    }

    .modal-badge {
      display: none;
      align-items: center;
      padding: 3px 9px;
      border-radius: 999px;
      background: #E6F4E8;
      color: #176935;
      font-size: 11px;
      font-weight: 600;
    }

    .modal-badge.show {
      display: inline-flex;
    }

    .modal-close {
      border: 0.5px solid var(--border-strong);
      background: #fff;
      border-radius: 8px;
      padding: 7px 12px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
    }

    .modal-body {
      padding: 18px 22px 20px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .detail-card {
      border: 0.5px solid var(--border-color);
      border-radius: 10px;
      padding: 12px 14px;
      background: var(--bg-light);
    }

    .detail-card.net {
      background: #F2F7F5;
      border-color: rgba(94, 138, 122, 0.24);
    }

    .detail-k {
      margin: 0;
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 500;
    }

    .detail-v {
      margin: 6px 0 0;
      font-family: 'Geist', ui-monospace, Menlo, monospace;
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.4px;
      font-variant-numeric: tabular-nums;
    }

    .detail-card.net .detail-v {
      color: #176935;
    }

    .detail-done-date {
      display: none;
      margin: -4px 0 14px;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .detail-done-date.show {
      display: block;
    }

    .detail-table-wrap {
      overflow: auto;
      border: 0.5px solid var(--border-color);
      border-radius: 10px;
      background: #fff;
    }

    .detail-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 4px 0 10px;
    }

    .detail-section-title {
      margin: 0;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.1px;
    }

    .detail-section-meta {
      margin: 0;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .settlement-detail-table {
      min-width: 1480px;
      width: 100%;
      border-collapse: collapse;
    }

    .settlement-detail-table th,
    .settlement-detail-table td {
      padding: 11px 12px;
      border-bottom: 0.5px solid var(--border-color);
      white-space: nowrap;
      font-size: 12px;
      vertical-align: middle;
    }

    .settlement-detail-table thead th {
      background: var(--bg-light);
      color: var(--text-secondary);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-align: right;
    }

    .settlement-detail-table .group-row th {
      padding: 8px 6px 0;
      background: #fff;
      border-bottom: 0;
      text-align: center;
    }

    .table-group-label {
      display: block;
      padding: 7px 10px;
      border-radius: 6px;
      text-align: center;
      font-size: 11px;
      font-weight: 700;
    }

    .table-group-label.platform { background: #FAF6EE; color: #A6813A; }
    .table-group-label.deduct { background: #F3F6F8; color: #72808A; }
    .table-group-label.settle { background: #F2F7F5; color: #5E8A7A; }

    .settlement-detail-table td {
      color: var(--text-primary);
      text-align: right;
      font-family: 'Geist', ui-monospace, Menlo, monospace;
      font-variant-numeric: tabular-nums;
    }

    .settlement-detail-table td.text-cell {
      text-align: right;
      font-family: 'Geist', 'Pretendard', system-ui, sans-serif;
    }

    .settlement-detail-table td.producer-pay {
      font-weight: 700;
      color: var(--text-primary);
    }

    .subtotal-row td {
      background: var(--bg-light);
      color: var(--text-secondary);
      font-weight: 600;
    }

    .subtotal-row td:first-child {
      text-align: right;
      font-family: 'Geist', 'Pretendard', system-ui, sans-serif;
    }

    .modal-foot {
      position: sticky;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 22px;
      border-top: 0.5px solid var(--border-color);
      background: #fff;
    }

    .modal-help {
      margin: 0;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .modal-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-action {
      border: 0.5px solid var(--border-strong);
      background: #fff;
      border-radius: 8px;
      padding: 8px 13px;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
    }

    .modal-action.primary {
      border-color: var(--primary-blue);
      background: var(--primary-blue);
      color: #fff;
      font-weight: 600;
    }

    @media (max-width: 920px) {
      .page-wrap {
        width: calc(100vw - 32px);
        padding: 24px 0 40px;
      }
      .notice-banner { grid-template-columns: 1fr; }
      .notice-left { border-right: 0; padding-right: 0; border-bottom: 0.5px solid rgba(29, 63, 168, 0.18); padding-bottom: 20px; }
      .notice-title { font-size: 24px; }
      .notice-desc { font-size: 13px; }
      .notice-btn { font-size: 13px; padding: 9px 13px; }
      .notice-right-amount { font-size: 30px; }
      .content-title { font-size: 18px; }
      .content-grid { grid-template-columns: 1fr; }
      .content-card {
        grid-template-columns: 48px minmax(0, 1fr) 24px;
        gap: 12px;
      }
      .poster { width: 48px; height: 66px; }
      .content-card .card-foot { display: none; }
      .card-title { font-size: 16px; }
      .card-meta { font-size: 12px; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .panel-head { flex-direction: column; align-items: stretch; }
      .search { width: 100%; }
      th, td { font-size: 13px; }
      .detail-grid { grid-template-columns: 1fr; }
      .history-title { font-size: 18px; }
      .history-table-wrap { overflow-x: auto; }
      .history-table { min-width: 720px; }
      .history-month { font-size: 14px; }
      .history-done-date { font-size: 12px; }
      .history-amount-value { font-size: 16px; }
      .status-done { font-size: 11px; }
      .history-detail-btn { font-size: 12px; padding: 7px 12px; }
    }
  </style>
</head>
<body>
  <div id="settlement-dashboard-chrome"></div>

  <main class="page-wrap">
    <section id="settlementStatus" class="notice-banner"></section>

    <section class="content-section">
      <div class="content-head">
        <div>

  <div id="settlementModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="settlementModalTitle">
    <div class="modal-panel">
      <div class="modal-head">
        <div class="modal-title-block">
          <div class="modal-title-row">
            <h3 id="settlementModalTitle" class="modal-title">2025년 4월 정산 처리 내역</h3>

          </div>
          <p id="settlementModalSubtitle" class="modal-subtitle">콘텐츠 3건 · 플랫폼 정산 4건</p>

      </div>
      <div class="modal-body">
        <p id="settlementDoneDate" class="detail-done-date"></p>
        <div class="detail-grid">
          <div class="detail-card">
            <p class="detail-k">실제 입금액</p>
            <p id="detailGross" class="detail-v">₩15,820,000</p>
          </div>
          <div class="detail-card">
            <p class="detail-k">비에이블 수수료 금액</p>
            <p id="detailDeduction" class="detail-v">₩2,486,587</p>
          </div>
          <div class="detail-card net">
            <p class="detail-k">최종 정산액</p>
            <p id="detailNet" class="detail-v">₩10,733,413</p>
          </div>
        </div>

        <div class="detail-section-head">
          <p class="detail-section-title">상세 내역</p>
          <p id="detailSectionMeta" class="detail-section-meta">플랫폼별 지급 및 공제 기준</p>

          <table class="settlement-detail-table">
            <thead id="detailHead"></thead>
            <tbody id="detailRows"></tbody>

      <div class="modal-foot">
        <p id="modalHelp" class="modal-help">검토를 마치면 정산 요청을 진행해 주세요.</p>
        <div class="modal-actions">
          <button type="button" class="modal-action" onclick="closeSettlementNotice()">닫기</button>
          <button id="modalConfirmBtn" type="button" class="modal-action primary" onclick="confirmSettlementRequest()">정산 요청</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('settlement-dashboard-chrome').innerHTML =
      window.ShortflowNav.renderTopNav('producer-dashboard') +
      window.ShortflowNav.renderDashboardSubNav('settlement', 'producer');

    const contents = [
      { title: '남잠공주의 스포일러', year: '2024', genre: '로맨스 판타지', amount: 24318502, platforms: ['DramaBox', 'ReelShort', 'ShortMax'], release: '2024-11', poster: '#e9d8dc' },
      { title: '닥터 루시퍼', year: '2024', genre: '미디컬 미스터리', amount: 41205770, platforms: ['ReelShort', 'DramaBox', 'ShortMax', 'GoodShort'], release: '2024-08', poster: '#c5cadc' },
      { title: '회귀한 재벌의 복수극', year: '2025', genre: '복수극', amount: 18984620, platforms: ['ShortMax', 'DramaBox'], release: '2025-01', poster: '#e8dbbc' },
      { title: '늑대왕자의 비밀', year: '2025', genre: '판타지 로맨스', amount: 9412300, platforms: ['ReelShort', 'GoodShort'], release: '2025-02', poster: '#c4dddc' },
      { title: '사장님의 계약직 애인', year: '2024', genre: '오피스 로맨스', amount: 6750188, platforms: ['DramaBox', 'ShortMax', 'ReelShort'], release: '2024-12', poster: '#d3d6de' },
      { title: '비밀스파이의 키스', year: '2025', genre: '스파이 로맨스', amount: 2410000, platforms: ['ReelShort'], release: '2025-03', poster: '#e9d7da' }
    ];

    let currentSettlementStatus = 'SCHEDULED'; // SCHEDULED | CONFIRMED | COMPLETED | NONE

    const currentSettlement = {
      monthLabel: '2025년 4월',
      monthShort: '4월',
      doneDate: '2025-05-15',
      rows: [
        {
          content: '남잠공주의 스포일러',
          platform: 'YouTube',
          period: '2025-04',
          platformPay: 6200000,
          depositRate: 30,
          whtRate: 10,
          wht: 620000,
          wireFee: 35000,
          fxRate: 1380,
          fxFee: 8000,
          krwIn: 5537000,
          bableRate: 7,
          bableFee: 387590,
          producerPay: 5149410
        },
        {
          content: '남잠공주의 스포일러',
          platform: 'Instagram',
          period: '2025-04',
          platformPay: 2840000,
          depositRate: null,
          whtRate: 16.5,
          wht: 468600,
          wireFee: 35000,
          fxRate: 1380,
          fxFee: 8000,
          krwIn: 2328400,
          bableRate: 7,
          bableFee: 162988,
          producerPay: 2165412
        },
        {
          content: '닥터 루시퍼',
          platform: 'Instagram',
          period: '2025-Q1',
          platformPay: 5120000,
          depositRate: null,
          whtRate: 16.5,
          wht: 844800,
          wireFee: 35000,
          fxRate: 1448,
          fxFee: 8000,
          krwIn: 4232200,
          bableRate: 7,
          bableFee: 296254,
          producerPay: 3935946
        },
        {
          content: '회귀한 재벌의 복수극',
          platform: 'TikTok',
          period: '2025-04',
          platformPay: 4500000,
          depositRate: 50,
          whtRate: 10,
          wht: 450000,
          wireFee: 35000,
          fxRate: 1402,
          fxFee: 8000,
          krwIn: 4007000,
          bableRate: 7,
          bableFee: 280490,
          producerPay: 3726510
        }
      ]
    };

    const historyItems = [
      {
        monthLabel: '2025년 3월',
        doneDate: '2025-04-15',
        rows: [
          { content: '남잠공주의 스포일러', platform: 'YouTube', period: '2025-03', platformPay: 6580000, depositRate: null, whtRate: 10, wht: 658000, wireFee: 35000, fxRate: 1392, fxFee: 8000, krwIn: 5879000, bableRate: 7, bableFee: 411530, producerPay: 5467470 },
          { content: '닥터 루시퍼', platform: 'Instagram', period: '2025-Q1', platformPay: 5210600, depositRate: null, whtRate: 16.5, wht: 859749, wireFee: 35000, fxRate: 1448, fxFee: 8000, krwIn: 4305851, bableRate: 7, bableFee: 301410, producerPay: 4004441 },
          { content: '회귀한 재벌의 복수극', platform: 'TikTok', period: '2025-03', platformPay: 3690000, depositRate: 50, whtRate: 10, wht: 369000, wireFee: 35000, fxRate: 1392, fxFee: 8000, krwIn: 3278000, bableRate: 7, bableFee: 229460, producerPay: 3048540 }
        ]
      },
      {
        monthLabel: '2025년 2월',
        doneDate: '2025-03-13',
        rows: [
          { content: '늑대왕자의 비밀', platform: 'YouTube', period: '2025-02', platformPay: 7410000, depositRate: 30, whtRate: 10, wht: 741000, wireFee: 35000, fxRate: 1430, fxFee: 9000, krwIn: 6625000, bableRate: 7, bableFee: 463750, producerPay: 6161250 },
          { content: '사장님의 계약직 애인', platform: 'Naver TV', period: '2025-02', platformPay: 7415700, depositRate: null, whtRate: 10, wht: 741570, wireFee: 35000, fxRate: 1430, fxFee: 9000, krwIn: 6630130, bableRate: 7, bableFee: 464109, producerPay: 6166021 }
        ]
      },
      {
        monthLabel: '2025년 1월',
        doneDate: '2025-02-12',
        rows: [
          { content: '비밀스파이의 키스', platform: 'TikTok', period: '2025-01', platformPay: 6230000, depositRate: null, whtRate: 10, wht: 623000, wireFee: 35000, fxRate: 1440, fxFee: 8000, krwIn: 5564000, bableRate: 7, bableFee: 389480, producerPay: 5174520 },
          { content: '남잠공주의 스포일러', platform: 'Instagram', period: '2024-Q4', platformPay: 7867850, depositRate: null, whtRate: 16.5, wht: 1298195, wireFee: 35000, fxRate: 1440, fxFee: 8000, krwIn: 6520655, bableRate: 7, bableFee: 456446, producerPay: 6064209 }
        ]
      }
    ];

    function formatMoney(v) {
      return '₩' + v.toLocaleString('ko-KR');
    }

    function formatPct(v) {
      return v == null ? '—' : `${v}%`;
    }

    function formatFx(v) {
      return v == null ? '—' : `₩${v.toLocaleString('ko-KR')}`;
    }

    function summaryForRows(rows) {
      return rows.reduce((acc, row) => {
        acc.gross += row.platformPay || 0;
        acc.deduction += (row.wht || 0) + (row.wireFee || 0) + (row.fxFee || 0) + (row.bableFee || 0);
        acc.krwIn += row.krwIn || 0;
        acc.bableFee += row.bableFee || 0;
        acc.net += row.producerPay || 0;
        return acc;
      }, { gross: 0, deduction: 0, krwIn: 0, bableFee: 0, net: 0 });
    }

    function rowsByContent(rows) {
      return rows.reduce((groups, row) => {
        if (!groups[row.content]) groups[row.content] = [];
        groups[row.content].push(row);
        return groups;
      }, {});
    }

    function renderSettlementStatus() {
      const target = document.getElementById('settlementStatus');
      const summary = summaryForRows(currentSettlement.rows);
      const completedTotal = historyItems.reduce((sum, item) => sum + summaryForRows(item.rows).net, 0);
      const commonRight = `
        <div>
          <p class="notice-right-label">예상 수령액</p>
          <p class="notice-right-amount">${formatMoney(summary.net)}</p>
        </div>
      `;

      const states = {
        SCHEDULED: {
          pill: '검토 필요',
          title: `${currentSettlement.monthShort} 정산 검토 요청`,
          desc: '지급액과 공제 내역을 확인한 뒤 요청을 완료해 주세요.',
          button: '검토하기',
          action: 'openSettlementNotice()',
          right: commonRight
        },
        CONFIRMED: {
          pill: '검토 완료',
          title: `${currentSettlement.monthShort} 처리 대기 중`,
          desc: '요청이 접수되었습니다. 지급 완료 후 완료 내역으로 이동합니다.',
          button: '상세보기',
          action: 'openSettlementNotice(true)',
          right: commonRight
        },
        COMPLETED: {
          pill: '정산 완료',
          title: `${currentSettlement.monthShort} 지급 완료`,
          desc: '완료된 상세 내역을 확인할 수 있습니다.',
          button: '상세보기',
          action: 'openSettlementNotice(true)',
          right: commonRight
        },
        NONE: {
          pill: '정산 요약',
          title: '현재 확인할 새 정산 내역이 없습니다.',
          desc: '미정산 합계와 완료 합계를 기준으로 현재 정산 흐름을 확인하세요.',
          button: '',
          action: '',
          right: `
            <div class="status-summary">
              <div class="status-summary-card">
                <p class="status-summary-label">미정산 합계</p>
                <p class="status-summary-value">${formatMoney(summary.net)}</p>
              </div>
              <div class="status-summary-card">
                <p class="status-summary-label">완료 합계</p>
                <p class="status-summary-value">${formatMoney(completedTotal)}</p>
              </div>
            </div>
          `
        }
      };

      const state = states[currentSettlementStatus] || states.NONE;
      target.innerHTML = `
        <div class="notice-left">
          <span class="notice-pill">${state.pill}</span>
          <h2 class="notice-title">${state.title}</h2>
          <p class="notice-desc">${state.desc}</p>
        </div>
        <div class="notice-right-block">
          ${state.right}
          ${state.button ? `<button class="notice-btn" type="button" onclick="${state.action}">${state.button} <span aria-hidden="true">→</span></button>` : ''}
        </div>
      `;
    }

    function sortedContents() {
      return [...contents].sort((a, b) => b.amount - a.amount);
    }

    function platformLabel(platforms) {
      if (!platforms || platforms.length === 0) return '플랫폼 없음';
      if (platforms.length === 1) return platforms[0];
      return `${platforms[0]} 외 ${platforms.length - 1}개 플랫폼`;
    }

    function renderContentGrid() {
      const list = sortedContents();
      const grid = document.getElementById('contentGrid');
      grid.innerHTML = list.map(item => `
        <article class="content-card" onclick="goDetail()">
          <div class="poster" style="background:${item.poster};"></div>
          <div>
            <div class="card-title-row">
              <h3 class="card-title">${item.title}</h3>
              <p class="card-meta">${item.year}</p>
            </div>
            <p class="card-sub">${platformLabel(item.platforms)}</p>
          </div>
          <div class="card-arrow" aria-hidden="true">›</div>
        </article>
      `).join('');
    }

    function goDetail() {
      window.location.href = 'settlement.html';
    }

    function renderHistoryRows() {
      const body = document.getElementById('historyBody');
      body.innerHTML = historyItems.map((item, idx) => {
        const summary = summaryForRows(item.rows);
        return `
        <tr class="history-row">
          <td>
            <p class="history-month">${item.monthLabel}</p>
          </td>
          <td class="history-count">${Object.keys(rowsByContent(item.rows)).length}편</td>
          <td><p class="history-amount-value">${formatMoney(summary.net)}</p></td>
          <td class="history-status"><span class="status-done">완료</span></td>
          <td class="history-action"><button class="history-detail-btn" type="button" onclick="openHistoryDetail(${idx})">상세보기 <span aria-hidden="true">〉</span></button></td>
        </tr>
      `}).join('');
    }

    function renderDetailHead() {
      document.getElementById('detailHead').innerHTML = `
        <tr class="group-row">
          <th colspan="2"></th>
          <th colspan="3"><span class="table-group-label platform">플랫폼 지급</span></th>
          <th colspan="6"><span class="table-group-label deduct">공제 내역</span></th>
          <th colspan="3"><span class="table-group-label settle">정산</span></th>
        </tr>
        <tr>
          <th class="text-cell">콘텐츠</th>
          <th class="text-cell">플랫폼</th>
          <th>발생월/분기</th>
          <th>플랫폼 지급액</th>
          <th>계약금 %</th>
          <th>원천세 비율</th>
          <th>원천세 금액</th>
          <th>송금 수수료</th>
          <th>환율</th>
          <th>환전 수수료</th>
          <th>실제 입금액(원)</th>
          <th>Bable 수수료율</th>
          <th>Bable 수수료 금액</th>
          <th>제작사 정산액</th>
        </tr>
      `;
    }

    function renderDetailRows(rows) {
      const groups = rowsByContent(rows);
      const body = Object.entries(groups).map(([content, contentRows]) => {
        return contentRows.map((r, idx) => `
          <tr>
            <td class="text-cell">${idx === 0 ? r.content : ''}</td>
            <td class="text-cell">${r.platform}</td>
            <td>${r.period}</td>
            <td>${formatMoney(r.platformPay)}</td>
            <td>${formatPct(r.depositRate)}</td>
            <td>${formatPct(r.whtRate)}</td>
            <td>${formatMoney(r.wht)}</td>
            <td>${formatMoney(r.wireFee)}</td>
            <td>${formatFx(r.fxRate)}</td>
            <td>${formatMoney(r.fxFee)}</td>
            <td>${formatMoney(r.krwIn)}</td>
            <td>${formatPct(r.bableRate)}</td>
            <td>${formatMoney(r.bableFee)}</td>
            <td class="producer-pay">${formatMoney(r.producerPay)}</td>
          </tr>
        `).join('');
      }).join('');
      const total = summaryForRows(rows);
      const totalBable = rows.reduce((sum, row) => sum + row.bableFee, 0);
      const totalKrwIn = rows.reduce((sum, row) => sum + row.krwIn, 0);
      document.getElementById('detailRows').innerHTML = `${body}
        <tr class="subtotal-row">
          <td colspan="3">전체 합계</td>
          <td colspan="7"></td>
          <td>${formatMoney(totalKrwIn)}</td>
          <td></td>
          <td>${formatMoney(totalBable)}</td>
          <td class="producer-pay">${formatMoney(total.net)}</td>
        </tr>
      `;
    }

    function fillModal(detail, options = {}) {
      const summary = summaryForRows(detail.rows);
      const readOnly = !!options.readOnly;
      const completed = !!options.completed;
      document.getElementById('settlementModalTitle').textContent = `${detail.monthLabel} 정산 처리 내역`;
      document.getElementById('settlementModalSubtitle').textContent =
        `콘텐츠 ${Object.keys(rowsByContent(detail.rows)).length}건 · 플랫폼 정산 ${detail.rows.length}건`;
      document.getElementById('settlementModalBadge').classList.toggle('show', completed);
      document.getElementById('settlementDoneDate').textContent = completed ? `정산 완료일 ${detail.doneDate}` : '';
      document.getElementById('settlementDoneDate').classList.toggle('show', completed);
      document.getElementById('modalConfirmBtn').style.display = readOnly ? 'none' : 'inline-flex';
      document.getElementById('modalHelp').textContent = readOnly
        ? '완료된 내역입니다. 읽기 전용으로 제공됩니다.'
        : '검토를 마치면 정산 요청을 진행해 주세요.';
      document.getElementById('detailSectionMeta').textContent = completed
        ? '완료 기준 상세'
        : '플랫폼별 지급 및 공제 기준';
      document.getElementById('detailGross').textContent = formatMoney(summary.krwIn);
      document.getElementById('detailDeduction').textContent = formatMoney(summary.bableFee);
      document.getElementById('detailNet').textContent = formatMoney(summary.net);
      renderDetailHead();
      renderDetailRows(detail.rows);
    }

    function openSettlementNotice(readOnly = false) {
      const completed = currentSettlementStatus === 'COMPLETED';
      fillModal(currentSettlement, { readOnly: readOnly || currentSettlementStatus !== 'SCHEDULED', completed });
      document.getElementById('settlementModal').classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function openHistoryDetail(index) {
      fillModal(historyItems[index], { readOnly: true, completed: true });
      document.getElementById('settlementModal').classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function confirmSettlementRequest() {
      currentSettlementStatus = 'CONFIRMED';
      renderSettlementStatus();
      closeSettlementNotice();
    }

    function closeSettlementNotice() {
      document.getElementById('settlementModal').classList.remove('show');
      document.body.style.overflow = '';
    }

    document.getElementById('settlementModal').addEventListener('click', function (e) {
      if (e.target === this) closeSettlementNotice();
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeSettlementNotice();
    });

    renderSettlementStatus();
    renderContentGrid();
    renderHistoryRows();
  </script>
</body>
</html>
