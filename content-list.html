<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>콘텐츠 리스트 조회</title>
  <link rel="stylesheet" href="dashboard-common.css">
  <script src="dashboard-nav.js"></script>
  <style>
    * { box-sizing: border-box; }
    :root {
      --orange: #e85d2c;
      --ink: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --surface: #ffffff;
      --soft: #f8f9fb;
    }
    body {
      margin: 0;
      background: #fff;
      color: var(--ink);
      font-family: "Geist", "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; }
    .content-list-main {
      padding: 24px 0 80px;
    }
    .filter-panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      overflow: hidden;
    }
    .search-row {
      height: 60px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px 0 28px;
      border-bottom: 1px solid #edf0f3;
    }
    .search {
      flex: 1;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 9px;
      color: #798192;
    }
    .search input {
      width: 100%;
      border: 0;
      outline: 0;
      color: var(--ink);
      font-size: 14px;
    }
    .search input::placeholder { color: #7c8495; }
    .divider { width: 1px; height: 22px; background: #d9dde4; }
    .tool-btn {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
    }
    .tool-btn.filter {
      color: var(--orange);
      border-color: #ffb49a;
      background: #fff8f5;
    }
    .filter-body {
      padding: 16px 16px 16px;
    }
    .filter-line {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 16px;
      align-items: start;
      margin-bottom: 12px;
    }
    .filter-line:last-child { margin-bottom: 0; }
    .filter-label {
      padding-top: 8px;
      font-size: 14px;
      font-weight: 400;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 8px;
    }
    .chip {
      height: 36px;
      padding: 0 14px;
      border: 1px solid #dfe3e8;
      border-radius: 6px;
      background: #fff;
      color: #111827;
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
    }
    .chip.active {
      border-color: var(--orange);
      background: var(--orange);
      color: #fff;
    }
    .list-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 18px 4px 18px;
    }
    .count {
      color: #5f6673;
      font-size: 14px;
      font-weight: 400;
    }
    .sort {
      display: flex;
      gap: 22px;
      color: #7d8391;
      font-size: 14px;
      font-weight: 400;
    }
    .sort button {
      border: 0;
      background: transparent;
      padding: 0;
      color: inherit;
      cursor: pointer;
      font-weight: inherit;
    }
    .sort button.active { color: var(--orange); }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 32px 24px;
    }
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 56px;
    }
    .page-btn {
      min-width: 18px;
      height: 24px;
      border: 0;
      background: transparent;
      color: #6b7280;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      padding: 0;
    }
    .page-btn svg {
      width: 14px;
      height: 14px;
      stroke-width: 2.1;
    }
    .page-btn.active {
      color: var(--orange);
      font-weight: 700;
    }
    .page-btn:disabled {
      color: #c0c5cf;
      cursor: default;
    }
    .content-footer {
      margin-top: 72px;
      padding: 28px 0 34px;
      border-top: 1px solid #e5e7eb;
      text-align: center;
      color: #6b7280;
      font-size: 13px;
      line-height: 1.7;
    }
    .footer-company {
      color: #111827;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .footer-line {
      margin-top: 6px;
    }
    .footer-line strong {
      color: #111827;
      font-weight: 700;
    }
    .footer-social {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin: 8px 0 10px;
      color: #111827;
    }
    .footer-social a {
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .footer-social svg {
      width: 16px;
      height: 16px;
      stroke-width: 1.8;
    }
    .footer-copy {
      color: #6b7280;
      font-size: 13px;
    }
    .card { min-width: 0; position: relative; }
    .poster {
      position: relative;
      width: 100%;
      height: auto;
      aspect-ratio: 2 / 3;
      flex: none;
      border-radius: 4px;
      overflow: hidden;
      background: #d1d5db;
      box-shadow: 0 1px 2px rgba(17,24,39,0.08);
    }
    .poster::before, .poster::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .poster::after {
      background: linear-gradient(180deg, rgba(0,0,0,0.02) 35%, rgba(0,0,0,0.62) 100%);
    }
    .fav {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 2;
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 18px;
      background: rgba(17,24,39,0.82);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .fav.active svg { fill: #ff3f4d; stroke: #ff3f4d; }
    .poster-title {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 22px;
      z-index: 1;
      color: #fff;
      font-size: 27px;
      font-weight: 400;
      line-height: 1.04;
      letter-spacing: -0.8px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.35);
      word-break: keep-all;
    }
    .poster-sub {
      position: absolute;
      left: 16px;
      top: 18px;
      z-index: 1;
      color: rgba(255,255,255,0.78);
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 1.3px;
    }
    .title {
      margin-top: 10px;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .genres {
      margin-top: 3px;
      color: #6b7280;
      font-size: 13px;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .p1 { background: radial-gradient(circle at 60% 18%, #f5d0d3 0 16%, transparent 17%), linear-gradient(145deg, #1d2435 0%, #624553 46%, #d7aaa2 100%); }
    .p1::before { background: linear-gradient(90deg, rgba(255,255,255,0.14) 0 1px, transparent 1px 36px), radial-gradient(circle at 36% 36%, rgba(255,255,255,0.22), transparent 20%); }
    .p2 { background: radial-gradient(circle at 40% 18%, #f9c6a5 0 14%, transparent 15%), linear-gradient(150deg, #121827 0%, #2a2030 42%, #86533d 100%); }
    .p3 { background: radial-gradient(circle at 62% 24%, #d7ecff 0 20%, transparent 21%), linear-gradient(150deg, #f8efe7 0%, #bcd8f4 50%, #fff7d6 100%); }
    .p4 { background: radial-gradient(circle at 55% 8%, #d8e7ff 0 8%, transparent 9%), linear-gradient(180deg, #0c1322 0%, #20364a 48%, #b38b5a 100%); }
    .p5 { background: linear-gradient(135deg, #fff1a9 0%, #ffd4e2 45%, #8ed5ff 100%); }
    .p6 { background: linear-gradient(160deg, #101820 0%, #27384a 44%, #c09a75 100%); }
    .p7 { background: radial-gradient(circle at 40% 36%, #fff8db 0 16%, transparent 17%), linear-gradient(145deg, #3a261f 0%, #a76848 52%, #f2d3ac 100%); }
    .p8 { background: linear-gradient(180deg, #c7d2dc 0%, #353f36 58%, #111827 100%); }
    .p9 { background: linear-gradient(135deg, #331b2c 0%, #753a52 54%, #e0a4a4 100%); }
    .p10 { background: linear-gradient(150deg, #101827 0%, #314a5e 48%, #e4c8b4 100%); }
    .p11 { background: linear-gradient(160deg, #eef2ff 0%, #b8c6e6 42%, #745f8d 100%); }
    .p12 { background: linear-gradient(150deg, #151a24 0%, #44384a 45%, #d99976 100%); }
    @media (max-width: 980px) {
      .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 720px) {
      .filter-line { grid-template-columns: 1fr; gap: 8px; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 24px 16px; }
      .pagination { margin-top: 44px; gap: 14px; }
      .content-footer { margin-top: 56px; padding-inline: 16px; }
      .poster-title { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div data-shortflow-nav="content"></div>

  <main class="main content-list-main">
    <section class="filter-panel">
      <div class="search-row">
        <label class="search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
          <input id="search" type="search" placeholder="콘텐츠 검색">
        </label>
        <div class="divider"></div>
        <button class="tool-btn filter" type="button">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M7 12h10M10 18h4"/></svg>
          필터
        </button>
        <button class="tool-btn" type="button" id="favoriteOnly">

      </div>

            <button class="chip" data-value="사극">사극</button>
            <button class="chip" data-value="코미디">코미디</button>
            <button class="chip" data-value="학원물">학원물</button>
            <button class="chip" data-value="액션">액션</button>
            <button class="chip" data-value="타임슬립">타임슬립</button>

            <button class="chip" data-value="BL/GL">BL/GL</button>

            <button class="chip" data-value="공포">공포</button>
            <button class="chip" data-value="여성향">여성향</button>
            <button class="chip" data-value="남성향">남성향</button>
          </div>
        </div>
        <div class="filter-line" data-filter="year">
          <div class="filter-label">연도</div>
          <div class="chips">
            <button class="chip active" data-value="전체">전체</button>
            <button class="chip" data-value="2026">2026</button>
            <button class="chip" data-value="2025">2025</button>
            <button class="chip" data-value="2024">2024</button>
            <button class="chip" data-value="2023">2023</button>
            <button class="chip" data-value="2022">2022</button>

            <button class="chip" data-value="한국어">한국어</button>
            <button class="chip" data-value="영어">영어</button>
            <button class="chip" data-value="중국어">중국어</button>

    <div class="list-meta">
      <div class="count" id="count">총 16개</div>
      <div class="sort">
        <button class="active" type="button" data-sort="popular">등록순</button>
        <button type="button" data-sort="latest">최신순</button>

    <section class="grid" id="grid" aria-label="콘텐츠 목록"></section>
    <nav class="pagination" id="pagination" aria-label="콘텐츠 페이지"></nav>

    <div class="footer-line"><strong>Tel:</strong> 070-5151-1827&nbsp;&nbsp;|&nbsp;&nbsp;<strong>Email:</strong> shortflow@bable-company.com</div>
    <div class="footer-social" aria-label="소셜 링크">
      <a href="#" aria-label="홈">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3 11 9-8 9 8"/><path d="M5 10v10h5v-6h4v6h5V10"/></svg>
      </a>
      <a href="#" aria-label="인스타그램">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="5"/><circle cx="12" cy="12" r="3.2"/><path d="M17.2 6.8h.01"/></svg>

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 12s0-4-1-5-5-1-9-1-8 0-9 1-1 5-1 5 0 4 1 5 5 1 9 1 8 0 9-1 1-5 1-5Z"/><path d="m10 9 5 3-5 3Z"/></svg>

  <script>
    const contents = [
      { title: '대표님, 계약 연애는 처음이라서요', genres: ['로맨스', '치정', '코미디'], year: '2026', language: '한국어', type: '숏드라마', favorite: true, poster: 'p1', href: 'content-detail.html', posterTitle: '계약 연애는 처음이라서요' },
      { title: '이혼 후 재벌 막내아들이 집착한다', genres: ['로맨스', '치정'], year: '2026', language: '한국어', type: '숏드라마', favorite: true, poster: 'p2', href: 'content-detail.html', posterTitle: '재벌 막내아들이 집착한다' },
      { title: '죽은 줄 알았던 남편이 돌아왔다', genres: ['로맨스', '복수'], year: '2025', language: '한국어', type: '숏드라마', favorite: false, poster: 'p3', href: 'content-detail.html', posterTitle: '남편이 돌아왔다' },
      { title: 'Save My Favorite', genres: ['로맨스', '타임슬립', '스릴러'], year: '2025', language: '영어', type: '숏드라마', favorite: true, poster: 'p4', href: 'content-detail.html', posterTitle: '귀신님 잘 부탁드립니다' },
      { title: '우리 반 전학생은 아이돌', genres: ['청춘', '학원물'], year: '2024', language: '한국어', type: '숏드라마', favorite: true, poster: 'p5', href: 'content-detail.html', posterTitle: '전학생은 아이돌' },
      { title: '깊은 밤의 고백', genres: ['로맨스', '여성향'], year: '2024', language: '한국어', type: '숏드라마', favorite: true, poster: 'p6', href: 'content-detail.html', posterTitle: '깊은 밤의 고백' },
      { title: '폐궁의 마지막 왕녀', genres: ['사극', '복수'], year: '2023', language: '한국어', type: '숏드라마', favorite: false, poster: 'p7', href: 'content-detail.html', posterTitle: '마지막 왕녀' },
      { title: '오피스와이프의 남자사냥법', genres: ['스릴러', '치정'], year: '2026', language: '한국어', type: '숏드라마', favorite: true, poster: 'p8', href: 'content-detail.html', posterTitle: '오피스 와이프의 남자사냥법' },
      { title: '내 남편의 비밀 계정', genres: ['복수', '스릴러'], year: '2025', language: '한국어', type: '숏드라마', favorite: false, poster: 'p9', href: 'content-detail.html', posterTitle: '비밀 계정' },
      { title: '첫사랑은 계약 종료', genres: ['로맨스', '코미디'], year: '2023', language: '한국어', type: '숏드라마', favorite: false, poster: 'p10', href: 'content-detail.html', posterTitle: '계약 종료' },
      { title: '달빛 아래 편의점', genres: ['청춘', 'SF'], year: '2022', language: '한국어', type: '숏드라마', favorite: false, poster: 'p11', href: 'content-detail.html', posterTitle: '달빛 편의점' },
      { title: '그녀의 두 번째 엔딩', genres: ['로맨스', '타임슬립'], year: '2026', language: '중국어', type: '숏드라마', favorite: true, poster: 'p12', href: 'content-detail.html', posterTitle: '두 번째 엔딩' },
      { title: '재벌가 입주 과외', genres: ['로맨스', '가족'], year: '2024', language: '한국어', type: '숏드라마', favorite: false, poster: 'p1', href: 'content-detail.html', posterTitle: '입주 과외' },
      { title: '나의 위험한 파트너', genres: ['액션', '로맨스'], year: '2025', language: '영어', type: '숏드라마', favorite: false, poster: 'p2', href: 'content-detail.html', posterTitle: '위험한 파트너' },
      { title: '황후의 복수 노트', genres: ['사극', '복수'], year: '2026', language: '중국어', type: '숏드라마', favorite: true, poster: 'p7', href: 'content-detail.html', posterTitle: '복수 노트' },
      { title: '우주 택배 기사님', genres: ['SF', '코미디'], year: '2022', language: '한국어', type: '숏애니', favorite: false, poster: 'p11', href: 'content-detail.html', posterTitle: '우주 택배' }
    ];

    const state = {
      type: '숏드라마',
      genre: '전체',
      year: '전체',
      language: '전체',
      favoriteOnly: false,
      sort: 'popular',
      query: '',
      page: 1,
      pageSize: 8
    };

    const grid = document.getElementById('grid');
    const count = document.getElementById('count');
    const search = document.getElementById('search');
    const pagination = document.getElementById('pagination');

    function iconHeart(filled) {
      return `<svg width="19" height="19" viewBox="0 0 24 24" fill="${filled ? '#ff3f4d' : 'none'}" stroke="${filled ? '#ff3f4d' : '#fff'}" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 1 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8Z"/></svg>`;
    }

    function render() {
      let items = contents.filter((item) => {
        if (state.type !== '전체' && item.type !== state.type) return false;
        if (state.genre !== '전체' && !item.genres.includes(state.genre)) return false;
        if (state.year !== '전체' && item.year !== state.year) return false;
        if (state.language !== '전체' && item.language !== state.language) return false;
        if (state.favoriteOnly && !item.favorite) return false;
        if (state.query && !item.title.toLowerCase().includes(state.query.toLowerCase())) return false;
        return true;
      });
      if (state.sort === 'latest') items = items.slice().sort((a, b) => Number(b.year) - Number(a.year));
      const totalPages = Math.max(1, Math.ceil(items.length / state.pageSize));
      state.page = Math.min(state.page, totalPages);
      const start = (state.page - 1) * state.pageSize;
      const pageItems = items.slice(start, start + state.pageSize);
      count.textContent = `총 ${items.length}개`;
      grid.innerHTML = pageItems.map((item, index) => `
        <article class="card">
          <a href="${item.href}">
            <div class="poster ${item.poster}">
              <div class="poster-sub">SHORTFLOW ORIGINAL</div>
              <div class="poster-title">${item.posterTitle}</div>
            </div>
          </a>
          <button class="fav ${item.favorite ? 'active' : ''}" data-title="${item.title}" aria-label="즐겨찾기">
            ${iconHeart(item.favorite)}
          </button>
          <a href="${item.href}">
            <div class="title">${item.title}</div>
            <div class="genres">${item.genres.join(', ')}</div>
          </a>
        </article>
      `).join('');
      renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
      if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
      }
      const prevIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>';
      const nextIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>';
      const pages = Array.from({ length: totalPages }, (_, index) => index + 1).map((page) => `
        <button class="page-btn ${page === state.page ? 'active' : ''}" type="button" data-page="${page}" aria-label="${page}페이지" ${page === state.page ? 'aria-current="page"' : ''}>${page}</button>
      `).join('');
      pagination.innerHTML = `
        <button class="page-btn" type="button" data-page="${state.page - 1}" aria-label="이전 페이지" ${state.page === 1 ? 'disabled' : ''}>${prevIcon}</button>
        ${pages}
        <button class="page-btn" type="button" data-page="${state.page + 1}" aria-label="다음 페이지" ${state.page === totalPages ? 'disabled' : ''}>${nextIcon}</button>
      `;
    }

    function resetPage() {
      state.page = 1;
    }

    document.getElementById('filters').addEventListener('click', (event) => {
      const chip = event.target.closest('.chip');
      if (!chip) return;
      const group = chip.closest('.filter-line');
      state[group.dataset.filter] = chip.dataset.value;
      group.querySelectorAll('.chip').forEach((item) => item.classList.toggle('active', item === chip));
      resetPage();
      render();
    });

    document.querySelector('.sort').addEventListener('click', (event) => {
      const btn = event.target.closest('button[data-sort]');
      if (!btn) return;
      state.sort = btn.dataset.sort;
      document.querySelectorAll('.sort button').forEach((item) => item.classList.toggle('active', item === btn));
      resetPage();
      render();
    });

    document.getElementById('favoriteOnly').addEventListener('click', (event) => {
      state.favoriteOnly = !state.favoriteOnly;
      event.currentTarget.classList.toggle('filter', state.favoriteOnly);
      resetPage();
      render();
    });

    search.addEventListener('input', (event) => {
      state.query = event.target.value.trim();
      resetPage();
      render();
    });

    pagination.addEventListener('click', (event) => {
      const btn = event.target.closest('button[data-page]');
      if (!btn || btn.disabled) return;
      state.page = Number(btn.dataset.page);
      render();
      document.querySelector('.list-meta').scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    grid.addEventListener('click', (event) => {
      const btn = event.target.closest('.fav');
      if (!btn) return;
      event.preventDefault();
      const item = contents.find((content) => content.title === btn.dataset.title);
      if (item) item.favorite = !item.favorite;
      render();
    });

    render();

  </script>
</body>
</html>
